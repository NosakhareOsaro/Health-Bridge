name: healthbridge_omop
version: "1.0.0"
config-version: 2

profile: healthbridge_omop

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

clean-targets:
  - target
  - dbt_packages

vars:
  # Concept used when a source code has no vocabulary mapping, per OMOP convention.
  no_matching_concept_id: 0

seeds:
  healthbridge_omop:
    vocabulary:
      +column_types:
        vocabulary_id: varchar(20)
    domain:
      +column_types:
        domain_id: varchar(20)
    concept:
      +column_types:
        concept_id: integer
        standard_concept: varchar(1)
    concept_relationship:
      +column_types:
        concept_id_1: integer
        concept_id_2: integer

models:
  healthbridge_omop:
    staging:
      +materialized: view
    omop:
      +materialized: table
