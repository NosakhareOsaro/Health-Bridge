[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# E501: line length is handled by formatting, not a hard error here.
# B008: FastAPI's Depends()/Query() *must* be used as call-in-default; this is the framework idiom.
ignore = ["E501", "B008"]
